<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giảm Giá - STUPID DOG 90S</title>
    <link rel="stylesheet" href="../Asset/Css/style.css">
    <link rel="stylesheet" href="../Asset/Css/modal.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <!-- Menu Container -->
    <div id="menu-container"></div>

    <main class="container">
        <div class="product-page-header">
            <h1 class="page-title">Khuyến Mãi & Giảm Giá</h1>
        </div>

        <!-- Filters -->
        <div class="filters-section">
            <div class="filter-group">
                <label for="sortBy">Sắp Xếp</label>
                <select id="sortBy">
                    <option value="newest">Mới Nhất</option>
                    <option value="price-low">Giá: Thấp - Cao</option>
                    <option value="price-high">Giá: Cao - Thấp</option>
                    <option value="name">Tên A-Z</option>
                </select>
            </div>

            <div class="filter-group">
                <label for="priceRange">Giá Tối Đa</label>
                <div class="price-display">
                    <input type="range" id="priceRange" min="0" max="1500000" value="1500000" step="50000">
                    <span id="priceValue">1.500.000</span>
                    <span>đ</span>
                </div>
            </div>

            <div class="product-count">
                <p>Hiển thị <span id="productCount">0</span> sản phẩm</p>
            </div>
        </div>

        <!-- Product Grid -->
        <section class="product-grid" id="productGrid">
        </section>
    </main>

    <!-- Footer Container -->
    <div id="footer-container"></div>

    <!-- Modal Container -->
    <div id="modal-container"></div>
    <div id="login-modal-container"></div>

    <script src="../Asset/js/main.js"></script>
    <script src="../Asset/js/modal.js"></script>
    <script src="../Asset/js/auth.js"></script>
    <script src="../Asset/js/products.js"></script>
    <script src="../Asset/js/search.js"></script>
    <script>
        // Load Menu
        fetch('menu-template.html')
            .then(response => response.text())
            .then(data => {
                document.getElementById('menu-container').innerHTML = data;
                loadMenuScripts();
            });

        // Load Modal
        fetch('modal-template.html')
            .then(response => response.text())
            .then(data => {
                document.getElementById('modal-container').innerHTML = data;
                initModalLogic();
            });

        fetch('login-modal.html')
            .then(response => response.text())
            .then(data => {
                document.getElementById('login-modal-container').innerHTML = data;
            });

        // Load Footer
        fetch('footer.html')
            .then(response => response.text())
            .then(data => {
                document.getElementById('footer-container').innerHTML = data;
            });

        document.addEventListener('DOMContentLoaded', function() {
            renderAllProducts();
        });
    </script>
</body>
</html>
