<!DOCTYPE html>
<html lang="vi">
<head>

</head>
<body>
    <main class="container">
        <div class="product-page-header">
            <h1 class="page-title">Kết Quả Tìm Kiếm</h1>
        </div>

        <div style="margin-bottom: 40px;">
            <div class="search-bar" style="background: #fafafa; padding: 20px; margin-bottom: 30px;">
                <button class="icon-btn" type="button" onclick="searchProducts()"><i class="fas fa-search"></i></button>
                <input type="text" id="searchInput" placeholder="Tìm kiếm sản phẩm..." style="flex: 1;" onkeypress="if(event.key === 'Enter') searchProducts()">
            </div>
            <p id="searchInfo" style="color: #999; font-size: 13px;"></p>
        </div>

        <!-- Product Grid -->
        <section class="product-grid" id="productGrid">
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Website Thời Trang Online - [STUPID DOG 90S]</p>
    </footer>

    <script src="../Asset/js/main.js"></script>
    <script src="../Asset/js/modal.js"></script>
    <script src="../Asset/js/auth.js"></script>
    <script src="../Asset/js/products.js"></script>
    <script src="../Asset/js/search.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            initSearch();
        });
    </script>
</body>
</html>
