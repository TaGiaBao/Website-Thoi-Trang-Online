<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Admin - Dashboard</title>
  <link rel="stylesheet" href="../../Asset/Css/style.css">
  <style>
    body.admin { background: #f5f7fb; }
    .admin-shell { display:flex; min-height:100vh; }
    .admin-sidebar { width:240px; background:#222; color:#fff; padding:20px; }
    .admin-sidebar a{ color:#fff; display:block; padding:8px 6px; text-decoration:none }
    .admin-sidebar a.active{ background:#444 }
    .admin-main{ flex:1; padding:24px }
    .admin-header{ display:flex; justify-content:space-between; align-items:center; margin-bottom:16px }
  </style>
</head>
<body class="admin">
  <div class="admin-shell">
    <aside class="admin-sidebar">
      <h2>Admin</h2>
      <nav>
        <a href="index.html" id="link-admin-home">Tổng quan</a>
        <a href="orders.html" id="link-admin-orders">Đơn hàng</a>
        <a href="notifications.html" id="link-admin-notifications">Thông báo</a>
        <a href="products.html" id="link-admin-products">Sản phẩm</a>
        <a href="discounts.html" id="link-admin-discounts">Giảm giá</a>
        <a href="users.html" id="link-admin-users">Người dùng</a>
        <hr style="border-color:#444">
        <a href="../index.html" id="link-frontend">Mở trang người dùng</a>
        <a href="#" id="admin-logout">Đăng xuất</a>
      </nav>
    </aside>

    <main class="admin-main">
      <div class="admin-header">
        <div>
          <h1>Dashboard</h1>
          <div id="admin-welcome">Xin chào, Admin</div>
        </div>
      </div>

      <section id="admin-content">
        <p>Chọn mục bên trái để quản lý.</p>
      </section>
    </main>
  </div>

  <script src="../../Asset/js/auth.js"></script>
  <script src="../../Asset/js/admin.js"></script>
  <script>
    // Ensure admin-only access
    function requireAdminPage() {
      const user = JSON.parse(localStorage.getItem('currentUser') || 'null');
      if (!user || user.role !== 'admin') {
        alert('Bạn cần quyền admin để truy cập trang này');
        window.location.href = '../../index.html';
        return false;
      }
      document.getElementById('admin-welcome').innerText = 'Xin chào, ' + (user.name || user.email);
      return true;
    }
    if (requireAdminPage()) {
      // hook logout
      document.getElementById('admin-logout').addEventListener('click', function(e){ e.preventDefault(); handleLogout(); window.location.href='../../index.html'; });
    }
  </script>
</body>
</html>
