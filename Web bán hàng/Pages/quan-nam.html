<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quần Nam - STUPID DOG 90S</title>
    <link rel="stylesheet" href="../Asset/Css/style.css">
    <link rel="stylesheet" href="../Asset/Css/modal.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body data-category="quan-au">
    <main class="container">
        <div class="product-page-header">
            <h1 class="page-title">Quần Nam</h1>
        </div>

        <!-- Filters -->
        <div class="filters-section">
            <div class="filter-group">
                <label for="sortBy">Sắp Xếp</label>
                <select id="sortBy">
                    <option value="newest">Mới Nhất</option>
                    <option value="price-low">Giá: Thấp - Cao</option>
                    <option value="price-high">Giá: Cao - Thấp</option>
                    <option value="name">Tên A-Z</option>
                </select>
            </div>

            <div class="filter-group">
                <label for="priceRange">Giá Tối Đa</label>
                <div class="price-display">
                    <input type="range" id="priceRange" min="0" max="1500000" value="1500000" step="50000">
                    <span id="priceValue">1.500.000</span>
                    <span>đ</span>
                </div>
            </div>

            <div class="product-count">
                <p>Hiển thị <span id="productCount">0</span> sản phẩm</p>
            </div>
        </div>

        <!-- Product Grid -->
        <section class="product-grid" id="productGrid">
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Website Thời Trang Online - [STUPID DOG 90S]</p>
    </footer>

    <script src="../Asset/js/main.js"></script>
    <script src="../Asset/js/modal.js"></script>
    <script src="../Asset/js/auth.js"></script>
    <script src="../Asset/js/products.js"></script>
    <script src="../Asset/js/search.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            renderProducts('quan-au');
        });
    </script>
</body>
</html>
