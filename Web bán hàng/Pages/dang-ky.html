<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tạo Tài Khoản | STUPID DOG</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Montserrat:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../Asset/Css/style.css">
    <link rel="stylesheet" href="../Asset/Css/modal.css">
    <style>
        .register-page {
            min-height: 100vh;
            background: #ffffff;
            padding: 40px 20px;
        }

        .register-container {
            max-width: 900px;
            margin: 0 auto;
            padding: 60px 40px;
            background: #ffffff;
        }

        .register-header {
            text-align: center;
            margin-bottom: 50px;
        }

        .register-header h1 {
            font-family: 'Playfair Display', serif;
            font-size: 42px;
            font-weight: 700;
            margin-bottom: 15px;
            letter-spacing: 1px;
        }

        .register-header p {
            font-size: 14px;
            color: #666;
            margin-bottom: 10px;
        }

        .login-link {
            font-size: 14px;
            color: #1a1a1a;
            text-decoration: underline;
            cursor: pointer;
            transition: opacity 0.3s;
        }

        .login-link:hover {
            opacity: 0.7;
        }

        .register-form {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px 40px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .form-group label {
            font-size: 13px;
            font-weight: 500;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-group input,
        .form-group select {
            padding: 15px;
            border: 1px solid #d0d0d0;
            font-family: 'Montserrat', sans-serif;
            font-size: 14px;
            background: #ffffff;
            transition: border-color 0.3s;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #1a1a1a;
        }

        .form-group input::placeholder {
            color: #999;
        }

        .form-group.full-width {
            grid-column: 1 / -1;
        }

        .form-divider {
            grid-column: 1 / -1;
            height: 1px;
            background: #f0f0f0;
            margin: 20px 0;
        }

        .phone-section {
            grid-column: 1 / -1;
        }

        .phone-section label {
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .phone-fields {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 15px;
        }

        .register-btn {
            grid-column: 1 / -1;
            padding: 16px 40px;
            background: #1a1a1a;
            color: #ffffff;
            border: none;
            font-family: 'Montserrat', sans-serif;
            font-size: 13px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 30px;
        }

        .register-btn:hover {
            background: #333;
            transform: translateY(-2px);
        }

        .terms {
            grid-column: 1 / -1;
            font-size: 12px;
            color: #666;
            margin-top: 20px;
            line-height: 1.8;
        }

        .terms a {
            color: #1a1a1a;
            text-decoration: underline;
            cursor: pointer;
        }

        @media (max-width: 768px) {
            .register-container {
                padding: 40px 20px;
            }

            .register-form {
                grid-template-columns: 1fr;
                gap: 20px;
            }

            .register-header h1 {
                font-size: 32px;
            }
        }
    </style>
</head>
<body>
    <!-- Menu Template -->
    <div id="menu-container"></div>

    <!-- Register Page -->
    <div class="register-page">
        <div class="register-container">
            <div class="register-header">
                <h1>Tạo tài khoản</h1>
                <p>Tạo tài khoản để tận hưởng trải nghiệm được cá nhân hóa</p>
                <p>Bạn đã có tài khoản My LV? <a class="login-link" href="#" onclick="openLoginModal(); return false;">Đăng nhập lại đây</a></p>
            </div>

            <form class="register-form" onsubmit="handleRegister(event)">
                <!-- Email -->
                <div class="form-group full-width">
                    <label for="email">Email *</label>
                    <input type="email" id="email" placeholder="" required>
                </div>

                <!-- Email Confirmation -->
                <div class="form-group full-width">
                    <label for="confirmEmail">Email xác thực *</label>
                    <input type="email" id="confirmEmail" placeholder="" required>
                </div>

                <!-- Divider -->
                <div class="form-divider"></div>

                <!-- Title -->
                <div class="form-group">
                    <label for="title">Tiêu đề *</label>
                    <select id="title" required>
                        <option value="">Chọn danh xưng</option>
                        <option value="Mr">Anh</option>
                        <option value="Mrs">Chị</option>
                        <option value="Ms">Cô</option>
                    </select>
                </div>

                <!-- First Name -->
                <div class="form-group">
                    <label for="firstName">Tên *</label>
                    <input type="text" id="firstName" placeholder="" required>
                </div>

                <!-- Last Name -->
                <div class="form-group">
                    <label for="lastName">Họ *</label>
                    <input type="text" id="lastName" placeholder="" required>
                </div>

                <!-- Password -->
                <div class="form-group">
                    <label for="password">Mật khẩu *</label>
                    <input type="password" id="password" placeholder="" required>
                </div>

                <!-- Phone Section -->
                <div class="phone-section">
                    <label>Số điện thoại</label>
                    <div class="phone-fields">
                        <select id="country">
                            <option value="+84">🇻🇳 +84</option>
                            <option value="+1">🇺🇸 +1</option>
                            <option value="+44">🇬🇧 +44</option>
                            <option value="+33">🇫🇷 +33</option>
                        </select>
                        <input type="tel" id="phone" placeholder="Số điện thoại">
                    </div>
                </div>

                <!-- Submit Button -->
                <button type="submit" class="register-btn">Tạo tài khoản</button>

                <!-- Terms -->
                <div class="terms">
                    <p>Bằng cách nhấp vào "Tạo tài khoản", tôi xác nhận rằng tôi đã đọc và chấp nhận <a href="#">Điều khoản và Điều kiện</a> cũng như <a href="#">Chính sách Bảo mật</a> của STUPID DOG.</p>
                </div>
            </form>
        </div>
    </div>

    <!-- Modal Template -->
    <div id="modal-container"></div>
    <div id="login-modal-container"></div>

    <!-- Footer -->
    <div id="footer-container"></div>

    <!-- Scripts -->
    <script src="../Asset/js/auth.js"></script>

    <script>
        // Load templates
        const isRootPath = window.location.pathname.includes('/Pages/');
        const basePath = isRootPath ? '../Pages/' : './Pages/';

        fetch(basePath + 'menu-template.html')
            .then(response => response.text())
            .then(data => {
                document.getElementById('menu-container').innerHTML = data;
                loadMenuScripts();
            });

        fetch(basePath + 'footer.html')
            .then(response => response.text())
            .then(data => {
                document.getElementById('footer-container').innerHTML = data;
            });

        fetch(basePath + 'modal-template.html')
            .then(response => response.text())
            .then(data => {
                document.getElementById('modal-container').innerHTML = data;
                initModalLogic();
            });

        fetch(basePath + 'login-modal.html')
            .then(response => response.text())
            .then(data => {
                document.getElementById('login-modal-container').innerHTML = data;
            });

        // Handle Register
        function handleRegister(e) {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const confirmEmail = document.getElementById('confirmEmail').value;
            const password = document.getElementById('password').value;
            const firstName = document.getElementById('firstName').value;
            const lastName = document.getElementById('lastName').value;

            if (email !== confirmEmail) {
                alert('Email không trùng khớp!');
                return;
            }

            if (password.length < 6) {
                alert('Mật khẩu phải có ít nhất 6 ký tự!');
                return;
            }

            // Store user info
            const userData = {
                email,
                firstName,
                lastName,
                password,
                phone: document.getElementById('phone').value,
                createdAt: new Date().toISOString()
            };

            localStorage.setItem('currentUser', JSON.stringify(userData));
            localStorage.setItem('userLoggedIn', 'true');

            alert('Tạo tài khoản thành công! Bạn sẽ được chuyển hướng...');
            window.location.href = '/index.html';
        }
    </script>
</body>
</html>
